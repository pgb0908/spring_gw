syntax = "proto3";

package iip.runtime.v1;

option java_package = "com.tmax.iip.common.grpc.runtime.v1";
option java_multiple_files = true;

message RuntimeHeader {
  string request_id = 1;
  string trace_id = 2;
  map<string, string> attributes = 3;
}

message RuntimePayload {
  bytes body = 1;
  string content_type = 2;
}

message RuntimeError {
  string code = 1;
  string message = 2;
  string detail = 3;
}
