syntax = "proto3";

package iip.gatewaycore.v1;

option java_multiple_files = true;
option java_package = "com.tmaxsoft.iip.common.grpc.gatewaycore.v1";

enum GatewayCoreAction {
  GATEWAY_CORE_ACTION_UNSPECIFIED = 0;
  START_REQUEST = 1;
  CONNECTOR_REQUEST = 2;
  CONNECTOR_RESPONSE = 3;
  RESPONSE_REQUEST = 4;
  RESPONSE_ACK = 5;
}

enum GatewayCoreStatus {
  GATEWAY_CORE_STATUS_UNSPECIFIED = 0;
  RECEIVED = 1;
  RUNNING = 2;
  SUCCESS = 3;
  ERROR = 4;
  FAILED = 5;
}

message GatewayCoreEnvelope {
  string guid = 1;
  GatewayCoreStatus status = 2;
  string error_code = 3;
  string error_message = 4;
  string flow_id = 5;
  int32 flow_version = 6;
  string gateway_id = 7;
  string core_id = 8;
  int64 started_at = 9;
  int64 finished_at = 10;
  int32 timeout = 11;
  string ingress_gateway_id = 12;
  string connector_id = 13;
  string node_id = 14;
  string node_type = 15;
  GatewayCoreAction action = 16;
  bytes payload = 17;
  string charset = 18;
  string content_type = 19;
}

message GatewayCoreAck {
  string guid = 1;
  GatewayCoreStatus status = 2;
  string error_code = 3;
  string error_message = 4;
}

service CoreRuntimeService {
  /**
  ingress gateway -> core
  지정한 flow를 trigger
   */
  rpc StartFlow(GatewayCoreEnvelope) returns (GatewayCoreAck);

  /**
  connector -> core
  flow의 request 노드 처리 결과를 core로 전송
   */
  rpc ReportRequestResult(GatewayCoreEnvelope) returns (GatewayCoreAck);

  /**
  ingress gateway -> core
  flow의 response 노드 처리 결과를 core로 전송
   */
  rpc ReportResponseResult(GatewayCoreEnvelope) returns (GatewayCoreAck);
}

service GatewayRuntimeService {
  /**
  core -> connector
  flow의 request 노드에서 connector를 호출함
   */
  rpc SendRequest(GatewayCoreEnvelope) returns (GatewayCoreAck);

  /**
  core -> ingress gateway
  flow의 response 노드에서 ingress-gateway를 호출함
   */
  rpc SendResponse(GatewayCoreEnvelope) returns (GatewayCoreAck);
}
