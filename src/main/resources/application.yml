server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: example-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/example/**
          filters:
            - StripPrefix=2  # /api/example/foo → /foo

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway

logging:
  level:
    com.example.gw: DEBUG
